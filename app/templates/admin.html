<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêmeo Digital de Viagem ✈️</title>
    <!-- Biblioteca para renderizar Markdown de forma elegante -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #8a2be2;
            --primary-hover: #7b27cc;
            --background: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-muted: #aaa;
            --accent: #00f5d4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .box {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 15px;
            line-height: 1.5;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }
        .option-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: bold;
        }
        select {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        
        /* Sistema de Abas para os Outputs */
        .tabs {
            display: flex;
            border-bottom: 2px solid #333;
            margin-top: 30px;
            gap: 10px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            width: auto;
            margin: 0;
            border-radius: 0;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        /* Renderização dos Stories */
        .stories-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .story-card {
            background: #1a1a1a;
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 20px;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .frame-number {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--primary);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .overlay-text {
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            margin-top: 40px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 8px;
            line-height: 1.4;
        }
        .visual-dir {
            font-size: 12px;
            color: #ccc;
            background: #262626;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 3px solid var(--primary);
        }
        .music-tag {
            font-size: 12px;
            color: #da70d6;
            background: #262626;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
            border-left: 3px solid #da70d6;
        }
        .sticker {
            background: var(--accent);
            color: #000;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Renderização do Artigo */
        .article-view {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            line-height: 1.8;
            font-size: 16px;
        }
        .article-header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .article-title {
            font-size: 32px;
            font-weight: bold;
            color: var(--text);
            margin: 0 0 10px 0;
            line-height: 1.3;
        }
        .article-subtitle {
            font-size: 18px;
            color: var(--text-muted);
            margin: 0 0 15px 0;
            font-style: italic;
        }
        .article-meta {
            font-size: 13px;
            color: var(--accent);
            font-weight: bold;
        }
        .article-body {
            color: #e0e0e0;
        }
        .article-body h2 {
            color: var(--primary);
            font-size: 22px;
            margin-top: 35px;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 8px;
        }
        .article-body strong {
            color: #fff;
        }

        .loading { text-align: center; color: var(--accent); display: none; margin-top: 20px; font-weight: bold;}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gêmeo Digital de Viagem ✈️</h1>
        
        <div class="box">
            <h3>Despeje suas memórias de viagem:</h3>
            <textarea id="rawText" placeholder="Cole aqui o seu relato de viagem..."></textarea>
            
            <div style="margin: 15px 0; padding: 15px; background: #1a1a1a; border: 1px dashed #444; border-radius: 8px;">
                <label style="display: block; margin-bottom: 8px;">Complementar com Foto (Opcional - Extrai Localização/Data)</label>
                <input type="file" id="imageInput" accept="image/jpeg, image/jpg" onchange="uploadFoto()" style="color: #ccc; font-size: 14px;">
                
                <div id="metadataFeedback" style="display: none; margin-top: 12px; font-size: 13px; color: var(--accent); background: #121212; padding: 10px; border-radius: 6px;">
                    📍 <b>Local Detectado:</b> <span id="metaLocation">Analisando...</span><br>
                    📅 <b>Data/Hora:</b> <span id="metaDate">...</span>
                </div>
            </div>  

            <div class="options-grid">
                <!-- Seletor de Formatos (Feature 1.2) -->
                <div class="option-group">
                    <label for="formatSelect">Formato Padrão de Visualização</label>
                    <select id="formatSelect" onchange="switchTabFromSelect()">
                        <option value="stories">Stories do Instagram 📸</option>
                        <option value="article">Artigo Detalhado 📝</option>
                    </select>
                </div>
                
                <!-- Seletor de Modo (Preparação para o Modo Ghostwriter - RFC-005) -->
                <div class="option-group">
                    <label for="modeSelect">Modo do Gêmeo Digital</label>
                    <select id="modeSelect">
                        <option value="coauthor">Modo Co-Autor (Preserva seu texto original)</option>
                        <option value="ghostwriter">Modo Ghostwriter (IA escreve por você)</option>
                    </select>
                </div>
            </div>

            <button onclick="processarViagem()">Processar com Gêmeo Digital ✨</button>
            <div id="loadingStatus" class="loading">🧠⚡ Seu Gêmeo Digital está transformando suas memórias...</div>
        </div>

        <!-- Abas de Saída -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-stories" onclick="switchTab('stories')">Stories 📸</button>
            <button class="tab-btn" id="tab-article" onclick="switchTab('article')">Artigo Detalhado 📝</button>
        </div>

        <!-- Conteúdo: Stories -->
        <div id="content-stories" class="tab-content active">
            <div id="storiesResult" class="stories-container">
                <p style="color: var(--text-muted); text-align: center; grid-column: 1/-1;">Nenhum Story gerado ainda. Digite um relato acima!</p>
            </div>
        </div>

        <!-- Conteúdo: Artigo -->
        <div id="content-article" class="tab-content">
            <div id="articleResult">
                <div class="article-view">
                    <p style="color: var(--text-muted); text-align: center; margin: 0;">Nenhum Artigo gerado ainda. Digite um relato acima!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estrutura para armazenar as respostas localmente e permitir alternar abas sem reprocessar
        let lastResult = {
            stories: null,
            article: null
        };

        async function uploadFoto() {
            const fileInput = document.getElementById('imageInput');
            const feedback = document.getElementById('metadataFeedback');
            const metaLocation = document.getElementById('metaLocation');
            const metaDate = document.getElementById('metaDate');
            
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            // Mostra o painel com estado de carregamento
            feedback.style.display = "block";
            metaLocation.innerText = "Lendo metadados EXIF e geolocalizando com Gemini... 🧠⚡";
            metaDate.innerText = "...";
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/media/extract', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === "success" && data.latitude) {
                    metaLocation.innerText = data.suggested_location;
                    
                    // Formata a data para ficar bonita na tela
                    if (data.taken_at) {
                        const dateObj = new Date(data.taken_at);
                        metaDate.innerText = dateObj.toLocaleString('pt-BR');
                    } else {
                        metaDate.innerText = "Não disponível na foto";
                    }
                    
                    // Inteligência de UX: Sugere anexar a localização descoberta ao texto!
                    const textArear = document.getElementById('rawText');
                    if (confirm(`Encontramos: "${data.suggested_location}". Quer adicionar essa localização ao seu rascunho de texto para ajudar a IA?`)) {
                        textArear.value = `[Foto tirada em: ${data.suggested_location} em ${metaDate.innerText}]\n` + textArear.value;
                    }
                } else {
                    metaLocation.innerText = "Não foi possível extrair coordenadas de GPS desta foto.";
                    metaDate.innerText = data.taken_at ? new Date(data.taken_at).toLocaleString('pt-BR') : "Não disponível";
                }
            } catch (error) {
                metaLocation.innerText = "Erro ao enviar arquivo: " + error;
            }
        }
        
        function switchTab(format) {
            // Atualiza botões das abas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${format}`).classList.add('active');

            // Atualiza visibilidade do conteúdo
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`content-${format}`).classList.add('active');

            // Sincroniza o select de formatos
            document.getElementById('formatSelect').value = format;
        }

        function switchTabFromSelect() {
            const selectedFormat = document.getElementById('formatSelect').value;
            switchTab(selectedFormat);
        }

        async function processarViagem() {
            const rawText = document.getElementById('rawText').value;
            const format = document.getElementById('formatSelect').value;
            const loading = document.getElementById('loadingStatus');
            
            if(!rawText) { alert("Por favor, digite seu relato primeiro!"); return; }
            
            loading.style.display = "block";
            
            const tripId = "trip_" + Date.now();
            
            try {
                // 1. Ingestão (POST)
                await fetch('http://127.0.0.1:8000/api/v1/trips/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: "user_wilkner",
                        trip_id: tripId,
                        raw_text: rawText,
                        media_metadata: []
                    })
                });

                // NOVO: Pega o modo escolhido no seletor da tela!
                const mode = document.getElementById('modeSelect').value;

                // 2. Requisição do formato escolhido (GET)
                const response = await fetch(`http://127.0.0.1:8000/api/v1/trips/${tripId}/output?format=${format}&mode=${mode}`);
                const data = await response.json();
                
                if (format === 'stories') {
                    lastResult.stories = data;
                    renderStories(data);
                    switchTab('stories');
                } else {
                    lastResult.article = data;
                    renderArticle(data);
                    switchTab('article');
                }
                
            } catch (error) {
                alert("Erro ao processar: " + error);
            } finally {
                loading.style.display = "none";
            }
        }

        function renderStories(data) {
            const container = document.getElementById('storiesResult');
            container.innerHTML = "";
            
            data.stories_sequence.forEach(frame => {
                let stickerHtml = "";
                if(frame.engagement_sticker && frame.engagement_sticker.type !== 'none') {
                    stickerHtml = `<div class="sticker">📊 Enquete: ${frame.engagement_sticker.question}</div>`;
                }
                
                container.innerHTML += `
                    <div class="story-card">
                        <div class="frame-number">#${frame.frame_number}</div>
                        <div class="overlay-text">"${frame.overlay_text}"</div>
                        <div>
                            <div class="visual-dir">🎬 <b>Direção:</b> ${frame.visual_direction}</div>
                            <div class="music-tag">🎵 <b>Áudio:</b> ${frame.audio_suggestion}</div>
                            ${stickerHtml}
                        </div>
                    </div>
                `;
            });
        }

        function renderArticle(data) {
            const container = document.getElementById('articleResult');
            
            // Usa a biblioteca marked para converter o Markdown retornado pelo Gemini em HTML limpo
            const parsedMarkdown = marked.parse(data.content_markdown);
            
            container.innerHTML = `
                <div class="article-view">
                    <div class="article-header">
                        <h1 class="article-title">${data.title}</h1>
                        <p class="article-subtitle">${data.subtitle}</p>
                        <div class="article-meta">
                            ⏱️ TEMPO ESTIMADO DE LEITURA: ${data.suggested_reading_time_minutes} MIN | 🌍 FLORENÇA
                        </div>
                    </div>
                    <div class="article-body">
                        ${parsedMarkdown}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
